<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Maya AI Utilities</title>

  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4f6f8;
      color: #18202a;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      margin-bottom: 32px;
      text-align: center;
      color: #667085;
    }

    .utilities {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      padding: 24px;
      border: 1px solid #d8dee6;
      border-radius: 14px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 4px 14px rgb(0 0 0 / 7%);
      transition:
        transform 150ms ease,
        box-shadow 150ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 22px rgb(0 0 0 / 12%);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }

    .card p {
      margin: 0;
      color: #667085;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #11151b;
        color: #f1f4f8;
      }

      .subtitle,
      .card p {
        color: #aeb8c5;
      }

      .card {
        border-color: #303844;
        background: #1b212a;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Maya AI Utilities</h1>
    <p class="subtitle">Select a utility to open it.</p>

    <section class="utilities">
      <a class="card" href="./water_bill_calculator_site/">
        <h2>Water Bill Calculator</h2>
        <p>Calculate proportional tenant water payments, allocations and excess usage.</p>
      </a>

      <a class="card" href="./employee-workday-calculator-manual-days-v2/">
        <h2>Employee Workday Calculator</h2>
        <p>Calculate monthly workdays and working hours, including holidays and manually adjusted days.</p>
      </a>
    </section>
  </main>
</body>
</html>
